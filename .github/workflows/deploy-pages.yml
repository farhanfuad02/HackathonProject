# Builds the frontend in demo mode (in-browser simulator, no backend
# needed) and publishes it to GitHub Pages on every push to main.
#
# No manual setup required: the configure-pages step enables the Pages
# site (source: "GitHub Actions") on first run.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (demo mode)
        working-directory: frontend
        run: npm run build
        env:
          VITE_DEMO: "true"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
