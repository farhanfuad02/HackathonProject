# Builds the frontend in demo mode (in-browser simulator, no backend
# needed) and publishes it to GitHub Pages on every push to main.
#
# No manual setup required: the configure-pages step enables the Pages
# site (source: "GitHub Actions") on first run.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # configure-pages creates a missing Pages site, but it will NOT
      # switch an existing site off the legacy "deploy from a branch"
      # source - and with the legacy source active, our deployment is
      # rejected and a Jekyll build of the README overwrites the site
      # on every push. Force the source to "GitHub Actions" first.
      - name: Set Pages source to GitHub Actions
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' \
          || echo "::warning::Could not switch the Pages source automatically. Set Settings -> Pages -> Source to 'GitHub Actions' manually."

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (demo mode)
        working-directory: frontend
        run: npm run build
        env:
          VITE_DEMO: "true"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
